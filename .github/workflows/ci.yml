name: Java & Terraform Multi-Env CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  # Gatillo Manual (Solo para Desarrollo)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo del despliegue manual'
        required: true
        default: 'Prueba de feature'

env:
  PROJECT_ID: mis-agentes
  REGION: us-central1
  REPO_NAME: customers-repo
  IMAGE_NAME: customers-api

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Check Java Format (Spotless)
      run: |
        cd customers-api
        ./mvnw spotless:check

    - name: Build and Run Tests
      run: |
        cd customers-api
        chmod +x mvnw
        ./mvnw clean test

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.9.0

    - name: Terraform Format Check
      run: terraform fmt -recursive -check

    - name: Terraform Validate (DEV)
      run: |
        cd terraform/environments/dev
        terraform init -backend=false
        terraform validate

    - name: Terraform Validate (PROD)
      run: |
        cd terraform/environments/prod
        terraform init -backend=false
        terraform validate

    - name: Docker Lint (Hadolint)
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: customers-api/Dockerfile

    - name: Verify Docker Build
      run: |
        cd customers-api
        docker build -t customers-api:test .

    - name: Docker Security Scan (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'customers-api:test'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

  deploy:
    name: Deploy to Google Cloud Run
    needs: build-and-test
    # Solo se ejecuta en push a main/develop O manualmente
    if: |
      github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set Environment Variables
      run: |
        # Lógica de Seguridad:
        # 1. Si es push a main -> SIEMPRE PROD
        # 2. Si es push a develop -> SIEMPRE DEV
        # 3. Si es manual -> SIEMPRE DEV (PROD bloqueado para manual)
        
        if [[ "${{ github.ref }}" == "refs/heads/main" && "${{ github.event_name }}" == "push" ]]; then
          echo "ENV_NAME=prod" >> $GITHUB_ENV
          echo "SERVICE_NAME=customers-api-prod" >> $GITHUB_ENV
          echo "SERVICE_PORT=9090" >> $GITHUB_ENV
        else
          echo "ENV_NAME=dev" >> $GITHUB_ENV
          echo "SERVICE_NAME=customers-api-dev" >> $GITHUB_ENV
          echo "SERVICE_PORT=8080" >> $GITHUB_ENV
        fi

    - name: Google Auth
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: Configure Docker for GCP
      run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

    - name: Build and Push Container
      run: |
        cd customers-api
        docker build -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
        docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --region ${{ env.REGION }} \
          --platform managed \
          --allow-unauthenticated \
          --port ${{ env.SERVICE_PORT }} \
          --set-env-vars="SPRING_PROFILES_ACTIVE=${{ env.ENV_NAME }}"
