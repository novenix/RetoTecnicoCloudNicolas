name: Java & Terraform CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Check Java Format (Spotless)
      run: |
        cd customers-api
        ./mvnw spotless:check

    - name: Build and Run Tests
      run: |
        cd customers-api
        chmod +x mvnw
        ./mvnw clean test

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.9.0

    - name: Terraform Format Check
      run: terraform fmt -recursive -check

    - name: Terraform Validate (DEV)
      run: |
        cd terraform/environments/dev
        terraform init -backend=false
        terraform validate

    - name: Terraform Validate (PROD)
      run: |
        cd terraform/environments/prod
        terraform init -backend=false
        terraform validate

    - name: Docker Lint (Hadolint)
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: customers-api/Dockerfile

    - name: Verify Docker Build
      run: |
        cd customers-api
        docker build -t customers-api:test .

    - name: Docker Security Scan (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'customers-api:test'
        format: 'table'
        exit-code: '1' # Hace fallar el CI si encuentra vulnerabilidades CRÍTICAS
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
